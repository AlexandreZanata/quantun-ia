name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Prepare release bundle
        env:
          MLFLOW_DISABLE: "1"
        run: |
          mkdir -p logs
          cp tests/contracts/fixtures/sample_experiments.jsonl logs/experiments.jsonl
          python scripts/prepare_release.py
          python scripts/prepare_release.py --verify-only dist/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: dist/release/

  publish:
    name: Publish GitHub release
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist/release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After publish: enable Zenodo-GitHub integration and copy DOI to CITATION.cff.
  # See docs/zenodo.md for DOI update steps.
