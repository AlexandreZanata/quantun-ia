name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.lock

      - name: Run ruff
        run: ruff check src/ tests/ experiments/ scripts/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install mypy types-PyYAML
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.lock

      - name: Run mypy
        run: mypy src/training src/quantum

  security-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.lock

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyTorch (CPU)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          MLFLOW_DISABLE: "1"
        run: |
          mkdir -p logs
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  experiment-smoke:
    name: Experiment Smoke (CI profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyTorch (CPU)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration smoke test
        env:
          MLFLOW_DISABLE: "1"
        run: pytest tests/integration/ tests/contracts/ -v

  docker-test:
    name: Docker Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build test

      - name: Run tests in Docker
        run: docker compose -f docker-compose.test.yml run --rm test

      - name: Run lint in Docker
        run: docker compose -f docker-compose.test.yml run --rm lint

  smoke-import:
    name: Smoke Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyTorch (CPU)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Verify core imports
        run: |
          python -c "import pennylane; print('PennyLane:', pennylane.__version__)"
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import streamlit; print('Streamlit OK')"
          pytest tests/smoke/ -v

  packaging:
    name: Editable Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyTorch (CPU)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install package editable
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install -r requirements-dev.txt

      - name: Verify entry point and CLI module
        run: |
          python -c "from importlib.metadata import entry_points; scripts = entry_points(group='console_scripts'); assert any(s.name == 'qml-run' for s in scripts)"
          python -c "from scripts.cli import main; assert main([__import__('pathlib').Path('nope.py')]) == 1"
