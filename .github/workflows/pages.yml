name: Deploy Leaderboard

on:
  push:
    branches: [main, master]
    paths:
      - "docs/leaderboard/**"
      - "scripts/publish_leaderboard.py"
      - "tests/contracts/fixtures/publication_experiments.jsonl"
      - "config/microqml_bench/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: GitHub Pages — MicroQML Leaderboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install jsonschema pyyaml

      - name: Validate public leaderboard artifacts
        env:
          PYTHONPATH: .
        run: python scripts/publish_leaderboard.py --verify-only

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/leaderboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
