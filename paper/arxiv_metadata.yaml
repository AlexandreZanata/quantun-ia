title: "Quantum-Inspired Machine Learning: A Reproducible Benchmark Suite on Synthetic and Real Data"
software_version: "0.9.18"

abstract: >
  We present quantun-ia, an open-source benchmark suite comparing variational quantum
  circuits against parameter-matched classical baselines on synthetic and real datasets.
  All experiments follow hypothesis-first discipline with multi-seed holdout evaluation,
  bootstrap confidence intervals, and Holm-Bonferroni corrected Wilcoxon tests.
  Publication-profile runs on UCI tabular data show backend parity between PennyLane
  simulators (exp_021) and inconclusive quantum-vs-classical gaps at matched parameter
  budgets (exp_022). The repository ships a reproducible pipeline exporting figures,
  LaTeX tables, Zenodo release bundles, and MicroQML Bench v1 for external replication.

