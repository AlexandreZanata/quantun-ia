repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        args: ["src/training", "src/quantum"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: hypothesis-not-placeholder
        name: hypothesis.md not placeholder
        entry: pytest tests/unit/test_hypothesis.py -q
        language: system
        pass_filenames: false
        always_run: true
