    gate_test: null
    exports: [native, torchscript]
    model_card: model_cards/quantum_nano_bc.md

  large_nano_hybrid_higgs:
    description: "Frozen LargeNanoMLP + 4-qubit QNN head on HIGGS"
    train_model: large_nano_hybrid
    dataset: higgs_v1
    exp_id: exp_037
