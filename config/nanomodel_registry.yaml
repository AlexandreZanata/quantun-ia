# Shippable nanomodel registry — one entry per downloadable model bundle.
# Train/ship: qml-ship --model <registry_key>
# Install:     qml-download --model <registry_key>

defaults:
  seed: 42
  profile: publication
  root: .

models:
  large_nano_mlp_synthea:
    description: "LargeNanoMLP (~1.17M) on Synthea CV — clinical ranking serve model"
    train_model: large_nano_mlp
    dataset: synthea_cv_risk_v1
    exp_id: exp_034
    seed: 42
    profile: publication
    serve:
      kind: open_large_nano
    train:
      kind: experiment
      experiment_key: exp_034_large_nano_synthea
    gate_test: tests/real/test_exp_034_large_nano_gate.py
    calibration_exp_id: exp_043
    exports: [native, onnx, torchscript]
    model_card: model_cards/large_nano_mlp_synthea.md

  large_nano_mlp_synthea_calibrated:
    description: "LargeNanoMLP Synthea with isotonic calibration (exp_043)"
    train_model: large_nano_mlp
    dataset: synthea_cv_risk_v1
    exp_id: exp_034
    seed: 42
    profile: publication
    serve:
      kind: open_large_nano
    train:
      kind: none
    gate_test: tests/real/test_exp_043_calibration_gate.py
    calibration_exp_id: exp_043
    exports: [native, onnx, torchscript]
    model_card: model_cards/large_nano_mlp_synthea.md
    depends_on: large_nano_mlp_synthea

  large_nano_mlp_higgs:
    description: "LargeNanoMLP (~1.14M) on HIGGS open tabular"
    train_model: large_nano_mlp
    dataset: higgs_v1
    exp_id: exp_032
    seed: 42
    profile: publication
    serve:
      kind: open_large_nano
    train:
      kind: experiment
      experiment_key: exp_032_large_nano_higgs
    gate_test: tests/real/test_exp_032_large_nano_gate.py
    exports: [native, onnx, torchscript]
    model_card: model_cards/large_nano_mlp_higgs.md

  large_nano_mlp_acyd_soy:
    description: "LargeNanoMLP (~1.16M) on ACYD Brazil soybean open tabular (C4 anchor)"
    train_model: large_nano_mlp
    dataset: acyd_soy_brazil_v1
    exp_id: exp_060
    seed: 42
    profile: publication
    calibration_exp_id: exp_082
    serve:
      kind: open_large_nano
    train:
      kind: experiment
      experiment_key: exp_060_large_nano_acyd_soy
    gate_test: tests/real/test_exp_060_large_nano_gate.py
    exports: [native, onnx, torchscript]
    model_card: model_cards/large_nano_mlp_acyd_soy.md

  large_nano_mlp_acyd_maize:
    description: "LargeNanoMLP (~1.16M) on ACYD Brazil maize open tabular (C4b anchor)"
    train_model: large_nano_mlp
    dataset: acyd_maize_brazil_v1
    exp_id: exp_081
    seed: 42
    profile: publication
    serve:
      kind: open_large_nano
    train:
      kind: experiment
      experiment_key: exp_081_large_nano_acyd_maize
    exports: [native, onnx, torchscript]
    model_card: model_cards/large_nano_mlp_acyd_maize.md

  residual_nano_distill_acyd_maize:
    description: "HistGB-distilled ResidualNanoMLP on ACYD Brazil maize (Cycle v2 Phase E ship)"
    train_model: residual_nano_distill
