  large_nano_mlp_nihr:
    description: "LargeNanoMLP (~1.11M) on NIHR synthetic CV open tabular (C2 anchor)"
    train_model: large_nano_mlp
    dataset: nihr_cv_synthetic_v1
    exp_id: exp_069
    seed: 42
    profile: publication
    serve:
      kind: open_large_nano
    train:
      kind: experiment
      experiment_key: exp_069_large_nano_nihr
    gate_test: tests/real/test_exp_069_large_nano_gate.py
