# Research Cycle v3 grand leaderboard — curated from RTX 4060 results.md (exp_101–111).
# Synthesis only (exp_112). Do not invent metrics; update from publication runs.
# delta: signed gap (primary − reference). For FID, lower primary is better (negative delta = win).
# For CLIPScore, higher primary is better (positive delta = win).
# For ingest/rel, primary is the gate metric (e.g. relative FID improvement).

