# Central experiment configuration — Quantum ML Lab
# Publication profile: circles dataset, noise=0.2, n=500, 10 seeds
# Use profile publication_large (n=1000) via load_experiment_config(key, profile="publication_large")

defaults:
  profile: publication
  epochs: 50
  learning_rate: 0.01
  dataset: circles
  n_samples: 500
  noise: 0.2
  random_state: 42
  test_size: 0.3
  seeds: [42, 123, 456, 789, 1024, 1337, 2048, 3001, 4096, 5000]

profiles:
  publication:
    n_samples: 500
    seeds: [42, 123, 456, 789, 1024, 1337, 2048, 3001, 4096, 5000]
    hpo_trials: 20
  publication_large:
    n_samples: 1000
    seeds: [42, 123, 456, 789, 1024, 1337, 2048, 3001, 4096, 5000]
  ci:
    n_samples: 50
    seeds: [42, 123]
    epochs: 5
    hpo_trials: 3
  mini:
    n_samples: 100
    seeds: [42]
    epochs: 8

experiments:
  exp_001_quantum_vs_classical:
    description: "Quantum vs Classical — circles, 10 seeds, bootstrap CI"
    models:
      - classical_8
      - classical_32
      - quantum_4q_2l
      - quantum_6q_3l
      - quantum_reupload_4q_3l
    model_configs:
      quantum_4q_2l:
        n_qubits: 4
        n_layers: 1
        learning_rate: 0.02
      quantum_6q_3l:
        n_qubits: 6
        n_layers: 2
        learning_rate: 0.02
      quantum_reupload_4q_3l:
        qnn_type: reupload
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02

  exp_002_hybrid_architecture:
    description: "Hybrid architecture with re-upload QNN — circles, 10 seeds"
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    architectures:
      - HybridSandwich
      - QuantumFirst
      - ClassicalFirst
    model_configs:
      hybrid_sandwich:
        learning_rate: 0.02
      quantum_first:
        learning_rate: 0.02
      classical_first:
        learning_rate: 0.02

  exp_003_entanglement_effect:
    description: "Entanglement with re-upload QNN — circles, 10 seeds"
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    entanglement_types:
      - none
      - chain
      - chain_half
      - ring
    model_configs:
      entanglement_chain_half:
        n_layers: 2
        learning_rate: 0.02
      entanglement_none:
        learning_rate: 0.02

  exp_004_data_poisoning:
    description: "Poisoning robustness — re-upload vs amplitude, clean holdout"
    poison_rates: [0.0, 0.05, 0.1, 0.2, 0.3]
    encodings:
      - reupload
      - amplitude
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    model_configs:
      reupload:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
      amplitude:
        n_qubits: 4
        n_layers: 2
        learning_rate: 0.02

  exp_005_curriculum_quantum:
    description: "Quantum curriculum on re-upload QNN — circles, 10 seeds, Wilcoxon vs random"
    methods:
      - random
      - margin_batches
    curriculum_stages: 4
    epochs_per_stage: 12
    refine_epochs: 12
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    learning_rate: 0.02
    learnability_threshold: 0.55

  exp_006_barren_plateau:
    description: "Barren plateau — 50 gradient samples per qubit count"
    n_qubits_list: [2, 4, 6, 8, 10]
    grad_samples: 50

  exp_007_self_play:
    description: "Self-play on re-upload QNN — circles, 10 seeds, capped hard_frac"
    rounds: 5
    hard_frac: 0.3
    min_hard: 5
    fine_tune_epochs: 15
    revert_threshold: 0.05
    base_epochs: 50
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    learning_rate: 0.02
    learnability_threshold: 0.55

  exp_008_data_reupload:
    description: "Data re-uploading QNN vs basic QNN vs param-matched classical — circles, 10 seeds"
    models:
      - quantum_basic
      - quantum_reupload
      - classical_matched
    model_configs:
      quantum_basic:
        n_qubits: 4
        n_layers: 1
        learning_rate: 0.02
      quantum_reupload:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
      classical_matched:
        learning_rate: 0.01

  exp_009_entanglement_basic:
    description: "Entanglement ablation — basic QNN (no re-upload), circles, 10 seeds"
    qnn_type: basic
    n_qubits: 4
    n_layers: 2
    entanglement_types:
      - none
      - chain
      - chain_half
      - ring
    model_configs:
      entanglement_chain_half:
        n_layers: 2
        learning_rate: 0.02
      entanglement_none:
        learning_rate: 0.02

  exp_010_poison_reupload_ablation:
    description: "Re-upload poisoning ablation — 2 layers vs 3 layers vs lower LR"
    poison_rates: [0.0, 0.3]
    reupload_variants:
      - reupload_3l
      - reupload_2l
      - reupload_lr_low
    baseline_variant: reupload_3l
    n_qubits: 4
    model_configs:
      reupload_3l:
        n_layers: 3
        learning_rate: 0.02
      reupload_2l:
        n_layers: 2
        learning_rate: 0.02
      reupload_lr_low:
        n_layers: 3
        learning_rate: 0.01

  exp_011_uci_tabular_qml:
    description: "UCI breast cancer — perceptron vs param-matched MLP vs angle QNN"
    exp_id: exp_011
    dataset: breast_cancer
    n_qubits: 4
    n_layers: 2
    hpo_seeds: [42, 123, 456]
    models:
      - perceptron
      - classical_matched
      - quantum_angle
    model_configs:
      perceptron:
        learning_rate: 0.02
      quantum_angle:
        learning_rate: 0.02
      classical_matched:
        learning_rate: 0.01

  exp_012_mnist_pca_qml:
    description: "MNIST 0 vs 1 with PCA — angle vs amplitude encoding"
    exp_id: exp_012
    dataset: mnist_binary
    n_samples: 500
    n_components: 8
    n_qubits: 4
    n_layers: 2
    model_configs:
      quantum_angle:
        learning_rate: 0.02
      quantum_amplitude:
        learning_rate: 0.02

  exp_013_augmentation_robustness:
    description: "Gaussian augmentation on noisy circles — QNN baseline vs augmented"
    exp_id: exp_013
    dataset: circles
    noise: 0.2
    augment_sigma: 0.15
    n_qubits: 4
    n_layers: 2
    model_configs:
      quantum_baseline:
        n_qubits: 4
        n_layers: 2
        learning_rate: 0.02

  exp_014_sequence_baselines:
    description: "Sequential synthetic task — RNN vs Transformer vs flattened QNN"
    exp_id: exp_014
    dataset: sequential_binary
    seq_len: 8
    input_dim: 2
    noise: 0.1
    n_qubits: 4
    n_layers: 2
    model_configs:
      rnn_mini:
        hidden_dim: 16
        learning_rate: 0.01
      transformer_mini:
        d_model: 16
        learning_rate: 0.01
      quantum_flat:
        learning_rate: 0.02

  exp_015_adaptive_qnn:
    description: "Gradient-variance adaptive LR vs fixed LR on plateau-prone QNN"
    exp_id: exp_015
    dataset: circles
    noise: 0.2
    learning_rate: 0.02
    adaptive_lr:
      var_target: 0.015
      min_scale: 0.25
      max_scale: 4.0
      warmup_epochs: 3
      adapt_every: 1
      base_lr: 0.02
    models:
      - quantum_6q_3l_fixed
      - quantum_6q_3l_adaptive
      - quantum_4q_2l_fixed
      - classical_matched
    model_configs:
      quantum_6q_3l:
        n_qubits: 6
        n_layers: 3
        learning_rate: 0.02
      quantum_4q_2l:
        n_qubits: 4
        n_layers: 2
        learning_rate: 0.02
      classical_matched:
        learning_rate: 0.01

  exp_016_hybrid_nas:
    description: "Optuna NAS over hybrid layouts vs fixed EXP 002 baselines"
    exp_id: exp_016
    dataset: circles
    noise: 0.2
    qnn_type: reupload
    hpo_seeds: [42, 123, 456]
    baselines:
      - hybrid_sandwich
      - quantum_first
      - classical_first
    search_space:
      architectures: [hybrid_sandwich, quantum_first, classical_first]
      n_qubits_min: 3
      n_qubits_max: 6
      n_layers_min: 1
      n_layers_max: 3
      learning_rate_min: 0.005
      learning_rate_max: 0.05
    model_configs:
      hybrid_sandwich:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true
      quantum_first:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true
      classical_first:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true

  exp_018_feature_fusion:
    description: "Transformer-mini → QNN fusion on phase-sensitive sequences"
    exp_id: exp_018
    dataset: sequential_phase
    seq_len: 12
    input_dim: 4
    noise: 0.15
    n_qubits: 4
    n_layers: 2
    pca_components: 4
    models:
      - transformer_qnn_fusion
      - transformer_mini
      - quantum_pca
      - quantum_flat
    model_configs:
      transformer_qnn_fusion:
        d_model: 16
        learning_rate: 0.01
      transformer_mini:
        d_model: 16
        learning_rate: 0.01
      quantum_pca:
        learning_rate: 0.02
      quantum_flat:
        learning_rate: 0.02

  exp_017_poison_topology:
    description: "Hybrid topology × label poisoning — clean holdout eval"
    exp_id: exp_017
    dataset: circles
    noise: 0.2
    poison_rates: [0.0, 0.1, 0.2, 0.3]
    qnn_type: reupload
    topologies:
      - hybrid_sandwich
      - quantum_first
      - classical_first
      - nas_preset
    nas_preset:
      architecture: quantum_first
      n_qubits: 5
      n_layers: 2
      learning_rate: 0.015817490011652512
      reupload: true
    model_configs:
      hybrid_sandwich:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true
      quantum_first:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true
      classical_first:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
        reupload: true

