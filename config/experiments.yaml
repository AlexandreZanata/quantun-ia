# Central experiment configuration — Quantum ML Lab
# Publication profile: circles dataset, noise=0.2, n=500, 10 seeds

defaults:
  epochs: 50
  learning_rate: 0.01
  dataset: circles
  n_samples: 500
  noise: 0.2
  random_state: 42
  test_size: 0.3
  seeds: [42, 123, 456, 789, 1024, 1337, 2048, 3001, 4096, 5000]

experiments:
  exp_001_quantum_vs_classical:
    description: "Quantum vs Classical — circles, 10 seeds, bootstrap CI"
    models:
      - classical_8
      - classical_32
      - quantum_4q_2l
      - quantum_6q_3l
      - quantum_reupload_4q_3l
    model_configs:
      quantum_4q_2l:
        n_qubits: 4
        n_layers: 1
        learning_rate: 0.02
      quantum_6q_3l:
        n_qubits: 6
        n_layers: 2
        learning_rate: 0.02
      quantum_reupload_4q_3l:
        qnn_type: reupload
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02

  exp_002_hybrid_architecture:
    description: "Hybrid architecture — circles, 10 seeds"
    architectures:
      - HybridSandwich
      - QuantumFirst
      - ClassicalFirst
    model_configs:
      hybrid_sandwich:
        learning_rate: 0.02
      quantum_first:
        learning_rate: 0.02
      classical_first:
        learning_rate: 0.02

  exp_003_entanglement_effect:
    description: "Quantum entanglement — circles, 10 seeds"
    n_qubits: 4
    n_layers: 2
    entanglement_types:
      - none
      - chain
      - chain_half
      - ring
    model_configs:
      entanglement_chain_half:
        n_layers: 1
        learning_rate: 0.02
      entanglement_none:
        learning_rate: 0.02

  exp_004_data_poisoning:
    description: "Poisoning robustness — circles, 10 seeds, clean holdout"
    poison_rates: [0.0, 0.05, 0.1, 0.2, 0.3]
    encodings:
      - angle
      - amplitude
    model_configs:
      angle:
        n_qubits: 4
        n_layers: 1
        learning_rate: 0.02
      amplitude:
        n_qubits: 4
        n_layers: 2
        learning_rate: 0.02

  exp_005_curriculum_quantum:
    description: "Quantum curriculum on re-upload QNN — circles, 10 seeds, Wilcoxon vs random"
    methods:
      - random
      - margin_batches
    curriculum_stages: 4
    epochs_per_stage: 12
    refine_epochs: 12
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    learning_rate: 0.02
    learnability_threshold: 0.55

  exp_006_barren_plateau:
    description: "Barren plateau — 50 gradient samples per qubit count"
    n_qubits_list: [2, 4, 6, 8, 10]
    grad_samples: 50

  exp_007_self_play:
    description: "Self-play on re-upload QNN — circles, 10 seeds, capped hard_frac"
    rounds: 5
    hard_frac: 0.3
    min_hard: 5
    fine_tune_epochs: 15
    revert_threshold: 0.05
    base_epochs: 50
    qnn_type: reupload
    n_qubits: 4
    n_layers: 3
    learning_rate: 0.02
    learnability_threshold: 0.55

  exp_008_data_reupload:
    description: "Data re-uploading QNN vs basic QNN vs param-matched classical — circles, 10 seeds"
    models:
      - quantum_basic
      - quantum_reupload
      - classical_matched
    model_configs:
      quantum_basic:
        n_qubits: 4
        n_layers: 1
        learning_rate: 0.02
      quantum_reupload:
        n_qubits: 4
        n_layers: 3
        learning_rate: 0.02
      classical_matched:
        learning_rate: 0.01
